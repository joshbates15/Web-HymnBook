<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hymn Book</title>
    
    <!-- DaisyUI + Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body class="bg-base-100 font-['Inter'] antialiased overflow-hidden">

    <div class="flex flex-col h-screen w-full p-2 box-border">
        
        <header id="mainHeader" class="py-2 flex-none">
            <h1 id="mainTitle" class="text-center text-4xl font-black tracking-tighter text-primary transition-all duration-300">Hymn Book</h1>
        </header>

        <!-- INPUT PAGE -->
        <div class="number-input-page flex flex-col flex-1 w-full gap-2">
            <!-- Display Area -->
            <div class="flex-none h-1/6 min-h-[100px]">
                <input type="text" id="hymnNumber" readonly
                    class="w-full h-full text-9xl font-black text-center bg-base-200 border-none rounded-2xl text-primary focus:outline-none" 
                    placeholder="0">
            </div>

            <!-- Keypad -->
            <div class="grid grid-cols-3 grid-rows-4 gap-2 flex-1">
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">1</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">2</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">3</button>
                
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">4</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">5</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">6</button>
                
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">7</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">8</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">9</button>
                
                <button class="key btn btn-error text-white text-6xl h-full font-bold">X</button>
                <button class="key btn btn-ghost bg-base-200 text-7xl h-full font-bold">0</button>
                <button id="searchButton" class="btn btn-primary text-white text-6xl h-full font-black uppercase">GO</button>
            </div>
        </div>

        <!-- DISPLAY PAGE -->
        <div class="hymn-display-page hidden flex-1 overflow-y-auto px-2">
            <div class="sticky top-0 bg-base-100 py-1 z-10 flex items-center justify-between border-b w-full">
                <div class="flex items-center gap-4">
                    <button id="backButton" class="btn btn-primary btn-md flex items-center gap-2 text-white shadow-md border-none px-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                        </svg>
                        <span class="font-black tracking-widest text-sm">BACK</span>
                    </button>
                    <h2 id="hymn-number-wrap" class="text-2xl font-black text-primary"></h2>
                </div>
                
                <!-- Settings Button aligned to the right -->
                <button id="settingsButton" class="btn btn-ghost btn-circle text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
            </div>
            <div id="hymnVerses" class="py-6 space-y-8"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <dialog id="settingsModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box bg-base-100">
            <h3 class="font-bold text-2xl text-primary font-['Pirata_One'] tracking-wide mb-4">Settings</h3>
            
            <div class="py-2">
                <label class="label px-0">
                    <span class="label-text font-bold text-lg">Text Size</span>
                </label>
                <div class="flex items-center gap-4 mt-2">
                    <span class="text-sm font-bold text-gray-500">A</span>
                    <input type="range" id="fontSizeSlider" min="1" max="3" step="0.1" value="1.4" class="range range-primary flex-1" />
                    <span class="text-3xl font-bold text-gray-500">A</span>
                </div>
            </div>
            
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary text-white font-black tracking-widest px-8">CLOSE</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(function (registration) {
                    console.log('Service Worker registered with scope:', registration.scope);
                })
                .catch(function (error) {
                    console.error('Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
